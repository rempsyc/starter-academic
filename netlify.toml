[build]
  command = "hugo --gc --minify -b $URL"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.80.0"
  HUGO_ENABLEGITINFO = "true"

[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview]
  command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

[[headers]]
  for = "*.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=UTF-8"

[[headers]]
  for = "index.xml"
  [headers.values]
    Content-Type = "application/rss+xml"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # CSP: Start with Report-Only to verify nothing breaks, then switch to
    # Content-Security-Policy (enforced) once confirmed working.
    #
    # Loaded resources by origin (full site scan 2026-04-16):
    #   Scripts: cdnjs.cloudflare.com, cdn.jsdelivr.net (MathJax), d1bxh8uas1mnw7.cloudfront.net (Altmetric),
    #            badge.dimensions.ai, www.googletagmanager.com (GTM), www.google-analytics.com (GA via GTM),
    #            embed.altmetric.com (badge runtime JS), identity.netlify.com, maps.googleapis.com
    #   Styles:  cdnjs.cloudflare.com, fonts.googleapis.com, badge.dimensions.ai (badge.css)
    #   Fonts:   cdnjs.cloudflare.com, fonts.gstatic.com
    #   Images:  maps tiles, GA pixel, Altmetric badges, Dimensions badges
    #   Frames:  Altmetric detail popups, GTM noscript, Google Maps
    Content-Security-Policy-Report-Only = '''
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' cdnjs.cloudflare.com cdn.jsdelivr.net www.googletagmanager.com www.google-analytics.com d1bxh8uas1mnw7.cloudfront.net badge.dimensions.ai embed.altmetric.com api.altmetric.com identity.netlify.com maps.googleapis.com;
      style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com badge.dimensions.ai embed.altmetric.com;
      img-src 'self' data: maps.googleapis.com maps.gstatic.com *.tile.openstreetmap.org cdnjs.cloudflare.com www.googletagmanager.com www.google-analytics.com d1bxh8uas1mnw7.cloudfront.net *.altmetric.com badge.dimensions.ai;
      font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com data:;
      connect-src 'self' www.google-analytics.com analytics.google.com *.analytics.google.com www.googletagmanager.com cdn.jsdelivr.net maps.googleapis.com badge.dimensions.ai metrics-api.dimensions.ai;
      frame-src www.google.com www.googletagmanager.com d1bxh8uas1mnw7.cloudfront.net *.altmetric.com;
      manifest-src 'self';
      form-action 'none';
      frame-ancestors 'none';
      object-src 'none';
      base-uri 'self';
      upgrade-insecure-requests'''

